<script>
  // Disable right click

      e.preventDefault();
    }

    // CTRL+SHIFT+I
    if(e.ctrlKey && e.shiftKey && e.key === 'I'){

    }

    }

    // CTRL+U
    if(e.ctrlKey && e.key === 'u'){
      e.preventDefault();
    }

  });

    e.preventDefault();
  });
